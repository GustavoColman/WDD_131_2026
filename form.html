<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="week5_form/styles/form.css">
    <script src="week5_form/scripts/form.js" defer></script>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Product Review</h1>
        </header>

        <form method="get" action="review.html" class="review-form">
            
            <div class="form-group">
                <label for="product-name">Product Name</label>
                <select id="product-name" name="product-name" required>
                    <option value="" disabled selected>Select a Product ...</option>
                    </select>
            </div>

            <div class="form-group">
                <label>Overall Rating</label>
                <div class="rating-options">
                    <label><input type="radio" id="rating1" name="rating" value="1" required><span class="stars">☆</span></label>
                    <label><input type="radio" id="rating2" name="rating" value="2" required><span class="stars">☆☆</span></label>
                    <label><input type="radio" id="rating3" name="rating" value="3" required><span class="stars">☆☆☆</span></label>
                    <label><input type="radio" id="rating4" name="rating" value="4" required><span class="stars">☆☆☆☆</span></label>
                    <label><input type="radio" id="rating5" name="rating" value="5" required><span class="stars">☆☆☆☆☆</span></label>
                </div>
            </div>

            <div class="form-group">
                <label for="install-date">Date of Installation</label>
                <input type="date" id="install-date" name="install-date" required>
            </div>

            <div class="form-group">
                <label>Which features did you find useful in the product?<br><small>(Check all that apply)</small></label>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="feat-durability" name="features" value="durability"> Durability</label>
                    <label><input type="checkbox" id="feat-ease" name="features" value="ease"> Ease of Use</label>
                    <label><input type="checkbox" id="feat-performance" name="features" value="performance"> Performance</label>
                    <label><input type="checkbox" id="feat-design" name="features" value="design"> Design</label>
                </div>
            </div>

            <div class="form-group">
                <label for="written-review">Written Review <span class="optional">(Optional)</span></label>
                <textarea id="written-review" name="written-review" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="user-name">Your Name <span class="optional">(Optional)</span></label>
                <input type="text" id="user-name" name="user-name">
            </div>

            <input type="submit" value="Post Review" class="submit-btn">
        </form>

        <footer class="footer">
            <p>&copy;<span id="currentyear"></span> 😎 Gustavo Colman 😎 Brasil</p>
            <p id="lastModified" class="last-mod"></p>
        </footer>
    </div>

</body>
</html>
